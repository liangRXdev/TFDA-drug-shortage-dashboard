name: Deploy React to GitHub Pages

on:
  # 當有程式碼推送至 main 分支時觸發
  push:
    branches: ["main"]
  # 允許從 GitHub 網頁手動觸發
  workflow_dispatch:
  # FDA 資料自動更新完成後觸發（GITHUB_TOKEN push 不觸發 push 事件）
  workflow_run:
    workflows: ["FDA Data Fetch & Update"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        
      - name: Build project
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite 預設打包輸出的資料夾名稱為 dist
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4